; MonDash - ESP32-S3 Monitoring Display
; Board: Hosyond ES3C28P (LCDWiki 2.8" ILI9341V)

[platformio]
src_dir = main

[env:mondash]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200

; Flash & PSRAM
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_upload.flash_size = 16MB

; PSRAM
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM=1
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DLV_KCONFIG_PRESENT
    -DCONFIG_MONDASH_WIFI_SSID=\"SNT\"
    -DCONFIG_MONDASH_WIFI_PASSWORD=\"Hippoxxxx!\"
    -DCONFIG_MONDASH_SERVER_URI=\"ws://100.123.83.86:8000/ws/esp\"
    -DCONFIG_MONDASH_MJPEG_BASE_URI=\"http://100.123.83.86:8000/stream\"

; sdkconfig defaults
board_build.sdkconfig = sdkconfig.defaults

; Upload
upload_speed = 921600
monitor_filters = esp32_exception_decoder
